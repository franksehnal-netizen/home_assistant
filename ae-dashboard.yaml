title: Acoustic Empire
views:
  - title: Přehled
    path: prehled
    icon: mdi:crown
    cards:
      - type: custom:mushroom-title-card
        title: ACOUSTIC EMPIRE
        subtitle: "Aktualizováno: {{ states('sensor.ae_dashboard_updated') }}"

      - type: custom:mushroom-chips-card
        alignment: center
        chips:
          - type: entity
            entity: sensor.ae_orders_active
            icon_color: blue
          - type: entity
            entity: sensor.ae_orders_pending_shipment
            icon_color: orange
          - type: entity
            entity: sensor.ae_revenue_ytd
            icon_color: green

      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:mushroom-template-card
            primary: Objednávky
            secondary: >-
              Aktivní: {{ states('sensor.ae_orders_active') }} · Celkem:
              {{ states('sensor.ae_orders_total') }}
            icon: mdi:clipboard-list
            icon_color: blue
            tap_action:
              action: url
              url_path: https://docs.google.com/spreadsheets/d/19rsOuxVhB0kMHSM-bkpp5gWpFXMncO6ReRsO_6tlYXE/
          - type: custom:mushroom-template-card
            primary: Tržby 2026
            secondary: "{{ states('sensor.ae_revenue_ytd') }} Kč fakturováno"
            icon: mdi:cash-multiple
            icon_color: green

      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:mushroom-template-card
            primary: Výroba
            secondary: >-
              {{ 'Tiskne · ' ~ states('sensor.prusa_mk4_prubeh') ~ ' %' if
              is_state('binary_sensor.prusa_mk4s_is_printing','on') else 'Idle' }}
            icon: mdi:printer-3d-nozzle
            icon_color: >-
              {{ 'green' if is_state('binary_sensor.prusa_mk4s_is_printing','on')
              else 'grey' }}
            entity: binary_sensor.prusa_mk4s_is_printing
            tap_action:
              action: more-info
          - type: custom:mushroom-template-card
            primary: Sklad housingů
            secondary: >-
              {{ states('sensor.ae_inventory_housings') }} ks skladem{% if
              states('sensor.ae_inventory_low_stock') | int > 0 %} · ⚠
              {{ states('sensor.ae_inventory_low_stock') }} SKU pod limitem{% endif %}
            icon: mdi:package-variant-closed
            icon_color: >-
              {{ 'red' if states('sensor.ae_inventory_low_stock') | int > 0 else
              'green' }}

      - type: entities
        title: Prusa MK4S
        state_color: true
        entities:
          - entity: binary_sensor.prusa_mk4s_online
            name: Online
          - entity: sensor.prusa_mk4
            name: Stav
          - entity: sensor.livingroom_prusa_mk4_pozice_x
            name: Pozice X
          - entity: sensor.livingroom_prusa_mk4_pozice_y
            name: Pozice Y
          - entity: sensor.livingroom_prusa_mk4_minimalni_teplota_extruze
            name: Min. teplota extruze

      - type: markdown
        content: >
          ### Klientské projekty


          - **2601001 ČT** — fáze 3

          - **2508001 Indigo Kids** — faktura


          _Ruční údržba (v1). Později lze plnit z n8n._
