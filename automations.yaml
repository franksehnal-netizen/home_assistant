- id: '1760638473413'
  alias: Daily Smart Home Summary
  description: 'Generates and sends a daily natural-language summary of home activity
    and energy usage at 21:00.

    '
  triggers:
  - at: '21:05:00'
    trigger: time
  conditions: []
  actions:
  - action: ai_task.generate_data
    metadata: {}
    data:
      task_name: daily_home_summary
      entity_id: ai_task.openai_ai_task
      instructions: "Hello! Here is your daily home data summary:\n\n- Prusa MK4S
        smart plug:\n    - Power: {{ states('sensor.smart_plug_prusa_mk4s_vykon')
        }} Watts (This is the **current** power draw, not a daily total.)\n\n    {#
        Current State Logic (Printing vs. Idle) #}\n    {% set prusa_power = states('sensor.smart_plug_prusa_mk4s_vykon')
        | float(0) %}\n    {% set prusa_state = states('switch.smart_plug_prusa_mk4s')
        %}\n\n    - State:\n    {% if prusa_state == 'on' %}\n        {% if prusa_power
        >= 15 %}\n            **Printing** ({{ prusa_power }} W is above the 15W idle
        threshold).\n        {% else %}\n            **Idle/On** ({{ prusa_power }}
        W means the printer is **not printing right now**).\n        {% endif %}\n
        \   {% else %}\n        **Off**\n    {% endif %}\n\n    - Daily energy consumption:
        {{ states('prusa_daily_energy') }} **kWh**\n\n{# --- Total Activity Summary
        (Using Template/History Stats) --- #}\n\n{% set printing_duration = states('sensor.prusa_mk4s_printing_duration_today')
        %}\n{% if printing_duration | string not in ['0:00:00','unknown','unavailable','']
        %}\n    - Prusa MK4S Total Printing Time: Your 3D printer was actively running
        a print job for **{{ printing_duration }}** today.\n{% endif %}\n\n- Desktop
        PC:\n    - State: {{ states('switch.smart_plug_desktop_pc') }}\n    - Power:
        {{ states('sensor.smart_plug_desktop_pc_vykon') }} Watts (This is the **current**
        power draw.)\n    - Daily energy consumption: {{ states('desktop_pc_daily_energy')
        }} **kWh**\n{% set pc_hours = states('sensor.desktop_pc_active_duration_today')
        | float(0) %}\n{% if pc_hours > 0 %}\n    - Active Time: **{{ (pc_hours *
        60) | round(0) }} min** (≈ {{ pc_hours | round(2) }} h)\n{% endif %}\n\n-
        Cognitive light:\n    - State: {{ states('switch.smart_plug_cognitive_light')
        }}\n    - Power: {{ states('sensor.smart_plug_cognitive_light_vykon') }} Watts\n
        \   - Daily energy consumption: {{ states('cognitive_light_daily_energy')
        }} **kWh**\n\n- Studio plug (audio interface, speakers, synths):\n    - State:
        {{ states('switch.ikea_of_sweden_inspelning_smart_plug') }}\n    - Power:
        {{ states('sensor.ikea_of_sweden_inspelning_smart_plug_vykon') }} Watts\n
        \   - Daily energy consumption: {{ states('studio_daily_energy') }} **kWh**\n\n{%
        set studio_duration = states('sensor.studio_active_duration_today') %}\n{%
        if studio_duration | string not in ['0:00:00','unknown','unavailable','']
        %}\n    - Studio Total Active Time: The studio gear was active for **{{ studio_duration
        }}** today.\n{% endif %}\n\n{# --- Motion and Kitchen Activity via history_stats
        --- #}\n\n{# Hallway (Chodba) #}\n{% set h_count   = states('sensor.hallway_motion_count_today')
        | int(0) %}\n{% set h_hours   = states('sensor.hallway_motion_time_today_h')
        | float(0) %}\n{% set h_minutes = (h_hours * 60) | round(0) %}\n{% set h_yest
        \   = states('sensor.hallway_motion_count_yesterday') | int(0) %}\n{% set
        h_diff    = h_count - h_yest %}\n{% set h_last    = states.binary_sensor.motion_sensor_chodba.last_changed
        %}\n\n- Presence (hallway motion):\n{% if h_count > 0 %}\n    - Events today:
        **{{ h_count }}**\n    - Active time: **{{ h_minutes }} min**\n    - Last
        motion: around **{{ as_local(h_last).strftime('%H:%M') }}**\n    - Trend vs
        yesterday: {% if h_diff > 0 %}+{{ h_diff }}{% elif h_diff < 0 %}{{ h_diff
        }}{% else %}no change{% endif %}\n{% else %}\n    No motion was recorded in
        the hallway today.\n{% endif %}\n\n{# Kitchen activity (vibration) #}\n{%
        set k_count   = states('sensor.kitchen_activity_count_today') | int(0) %}\n{%
        set k_hours   = states('sensor.kitchen_activity_time_today_h') | float(0)
        %}\n{% set k_minutes = (k_hours * 60) | round(0) %}\n{% set k_yest    = states('sensor.kitchen_activity_count_yesterday')
        | int(0) %}\n{% set k_diff    = k_count - k_yest %}\n\n- Kitchen activity:\n{%
        if k_count > 0 %}\n    - Events today: **{{ k_count }}**\n    - Active time:
        **{{ k_minutes }} min**\n    - Trend vs yesterday: {% if k_diff > 0 %}+{{
        k_diff }}{% elif k_diff < 0 %}{{ k_diff }}{% else %}no change{% endif %}\n{%
        else %}\n    No activity was detected on the kitchen counter today.\n{% endif
        %}\n\nSummarize in a friendly, narrative tone. Mention notable device activity
        (e.g. when the printer was active, or which devices were left on). End with
        a short positive note about the evening.\n"
    response_variable: ai_summary
  - action: persistent_notification.create
    data:
      title: Denní přehled domácnosti
      message: '{{ ai_summary.data }}'
    enabled: true
  - action: media_player.volume_set
    metadata: {}
    data:
      volume_level: 0.55
    target:
      device_id: 365f76f89eb2fdfaa553fc4a8a066d34
    enabled: true
  - action: tts.speak
    metadata: {}
    data:
      cache: true
      media_player_entity_id: media_player.living_room_speaker
      message: '{{ ai_summary.data }}'
    target:
      entity_id:
      - tts.piper
  - action: notify.notify
    metadata: {}
    data:
      message: '{{ ai_summary.data }}'
      title: Denní přehled domácnosti
  mode: single
