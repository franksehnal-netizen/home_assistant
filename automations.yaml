- id: '1774210332085'
  alias: Turn on Kitchen Light with Vibration (IKEA fix)
  description: Vibration → denní bílá 4000K, 100% jas (3-krok fix), vypnutí po 60
    min
  triggers:
  - entity_id: binary_sensor.vibration_sensor_kitchen
    from: 'off'
    to: 'on'
    for: 00:00:01
    trigger: state
  conditions:
  - condition: not
    conditions:
    - condition: state
      entity_id: media_player.playstation_4
      state: playing
  actions:
  - if:
    - condition: state
      entity_id: light.kuchyne
      state: 'off'
    then:
    - action: light.turn_on
      target:
        entity_id:
        - light.bulb_e27_cws_globe_806lm_kitchen
        - light.bulb_e27_cws_globe_806lm_sporak
      data:
        brightness_pct: 100
        transition: 0.5
    - delay: '00:00:00.7'
  - action: light.turn_on
    target:
      entity_id:
      - light.bulb_e27_cws_globe_806lm_kitchen
      - light.bulb_e27_cws_globe_806lm_sporak
    data:
      color_temp_kelvin: 4000
      brightness_pct: 100
      transition: 0.5
  - delay: '00:00:00.7'
  - action: light.turn_on
    target:
      entity_id:
      - light.bulb_e27_cws_globe_806lm_kitchen
      - light.bulb_e27_cws_globe_806lm_sporak
    data:
      brightness_pct: 100
      transition: 0.5
  - delay: 01:00:00
  - action: light.turn_off
    target:
      entity_id:
      - light.bulb_e27_cws_globe_806lm_kitchen
      - light.bulb_e27_cws_globe_806lm_sporak
    data:
      transition: 3
  - delay: '00:00:00.7'
  - action: light.turn_off
    target:
      entity_id:
      - light.bulb_e27_cws_globe_806lm_kitchen
      - light.bulb_e27_cws_globe_806lm_sporak
  mode: restart
- id: studio_auto_off_idle
  alias: Studio - Auto Off after 90 min idle
  description: Vypne studio smart plug po 90 min nečinnosti (jen večer). Posle warning notif 5 min predem.
  triggers:
  - trigger: state
    entity_id: binary_sensor.studio_is_active
    to: 'off'
    for: '01:30:00'
  conditions:
  - condition: time
    after: '18:00:00'
  - condition: state
    entity_id: switch.ikea_of_sweden_inspelning_smart_plug
    state: 'on'
  actions:
  - action: notify.notify
    data:
      title: Studio - vypinam za 5 min
      message: 90 min bez aktivity. Pro zruseni zapni neco ve studiu.
  - delay: '00:05:00'
  - condition: state
    entity_id: binary_sensor.studio_is_active
    state: 'off'
  - action: switch.turn_off
    target:
      entity_id: switch.ikea_of_sweden_inspelning_smart_plug
  mode: single
