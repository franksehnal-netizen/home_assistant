- id: '1771772142584'
  alias: AE Print - MK4S Finished (Smart, robust v2)
  triggers:
  - entity_id: sensor.prusa_mk4
    to: finished
    trigger: state
  actions:
  - wait_template: '{{ states(''sensor.prusa_mk4_nazev_souboru'') not in [''unknown'',''unavailable'','''']
      }}

      '
    timeout: 00:01:00
    continue_on_timeout: true
  - variables:
      printer: Prusa MK4S
      file: '{{ states(''sensor.prusa_mk4_nazev_souboru'') | default('''', true) }}'
      file_u: '{{ (file | string) | upper }}'
      job_type: "{% if file_u.startswith('AE_PROD') %}\n  PROD\n{% elif file_u.startswith('AE_TEST')
        %}\n  TEST\n{% elif file_u.startswith('AE_PROTO') %}\n  PROTO\n{% elif file_u.startswith('AE')
        %}\n  AE\n{% else %}\n  OTHER\n{% endif %}"
      color: "{% if job_type == 'PROD' %}\n  3066993\n{% elif job_type == 'TEST' %}\n
        \ 3447003\n{% elif job_type == 'PROTO' %}\n  16776960\n{% elif job_type ==
        'AE' %}\n  5763719\n{% else %}\n  8359053\n{% endif %}"
      title: "{% if job_type == 'PROD' %}\n  ✅ AE PRODUCTION Completed\n{% elif job_type
        == 'TEST' %}\n  \U0001F9EA AE TEST Completed\n{% elif job_type == 'PROTO'
        %}\n  \U0001F9E9 AE PROTOTYPE Completed\n{% else %}\n  ✅ AE Print Completed\n{%
        endif %}"
      description: "{% if job_type == 'PROD' %}\n  Production job finished and ready
        for QC + packing.\n{% elif job_type == 'TEST' %}\n  Test print finished. Please
        evaluate fit/finish and log results.\n{% elif job_type == 'PROTO' %}\n  Prototype
        finished. Review tolerances and document changes.\n{% else %}\n  Job finished
        successfully.\n{% endif %}"
  - condition: template
    value_template: '{{ file_u.startswith(''AE'') }}'
  - data:
      title: '{{ title }}'
      description: '{{ description }}'
      color: '{{ color }}'
      printer: '{{ printer }}'
      file: '{{ file }}'
    action: rest_command.discord_print_embed
  mode: single
- id: '1771787973375'
  alias: AE Print - MK4S (Capture + Notify, AE only)
  triggers:
  - entity_id: sensor.prusa_mk4
    to: printing
    id: start
    trigger: state
  - entity_id: sensor.prusa_mk4
    to: finished
    id: finished
    trigger: state
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: start
      sequence:
      - data:
          entity_id: input_text.ae_last_print_file
          value: ''
        action: input_text.set_value
      - wait_template: '{{ states(''sensor.prusa_mk4_nazev_souboru'') not in [''unknown'',''unavailable'','''']
          }}

          '
        timeout: 00:00:45
        continue_on_timeout: true
      - variables:
          file: '{{ states(''sensor.prusa_mk4_nazev_souboru'') | string | trim }}'
          file_u: '{{ file | upper }}'
      - condition: template
        value_template: '{{ file_u.startswith(''AE'') and file != '''' }}'
      - data:
          entity_id: input_text.ae_last_print_file
          value: '{{ file }}'
        action: input_text.set_value
    - conditions:
      - condition: trigger
        id: finished
      sequence:
      - variables:
          printer: Prusa MK4S
          file: '{{ states(''input_text.ae_last_print_file'') | string | trim }}'
          file_u: '{{ file | upper }}'
          job_type: '{% if file_u.startswith(''AE_PROD'') %}PROD {% elif file_u.startswith(''AE_TEST'')
            %}TEST {% elif file_u.startswith(''AE_PROTO'') %}PROTO {% elif file_u.startswith(''AE'')
            %}AE {% else %}OTHER {% endif %}'
          color: '{% if job_type == ''PROD'' %}3066993 {% elif job_type == ''TEST''
            %}3447003 {% elif job_type == ''PROTO'' %}16776960 {% elif job_type ==
            ''AE'' %}5763719 {% else %}8359053 {% endif %}'
          title: "{% if job_type == 'PROD' %}✅ AE PRODUCTION Completed {% elif job_type
            == 'TEST' %}\U0001F9EA AE TEST Completed {% elif job_type == 'PROTO' %}\U0001F9E9
            AE PROTOTYPE Completed {% else %}✅ AE Print Completed {% endif %}"
          description: "{% if job_type == 'PROD' %}\n  Production job finished and
            ready for QC + packing.\n{% elif job_type == 'TEST' %}\n  Test print finished.
            Please evaluate fit/finish and log results.\n{% elif job_type == 'PROTO'
            %}\n  Prototype finished. Review tolerances and document changes.\n{%
            else %}\n  Job finished successfully.\n{% endif %}"
      - condition: template
        value_template: '{{ file_u.startswith(''AE'') and file != '''' }}'
      - data:
          title: '{{ title }}'
          description: '{{ description }}'
          color: '{{ color }}'
          printer: '{{ printer }}'
          file: '{{ file }}'
        action: rest_command.discord_print_embed
  mode: restart
