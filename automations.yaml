- id: pohybove_svetlo_chodba_casova_intenzita
  alias: Chodba – Světlo dle času a intenzity (IKEA fix, smooth + logs)
  description: 3s rampa ON, 5s fade-out OFF. Den 100 %, noc 35 %. CT změna znovu pošle
    jas. Logbook pro ladění.
  triggers:
  - entity_id: binary_sensor.motion_sensor_chodba
    from: 'off'
    to: 'on'
    trigger: state
  actions:
  - choose:
    - conditions:
      - condition: time
        after: 07:00:00
        before: '22:00:00'
      sequence:
      - target:
          entity_id: light.bulb_e27_ws_globe_1055lm_chodba
        data:
          brightness: 254
          transition: 3
        action: light.turn_on
      - delay: '00:00:00.6'
      - target:
          entity_id: light.bulb_e27_ws_globe_1055lm_chodba
        data:
          color_temp_kelvin: 2857
          brightness: 254
        action: light.turn_on
      - wait_for_trigger:
        - entity_id: binary_sensor.motion_sensor_chodba
          to: 'off'
          for: 00:00:20
          trigger: state
        timeout: 00:10:00
        continue_on_timeout: true
      - target:
          entity_id: light.bulb_e27_ws_globe_1055lm_chodba
        data:
          brightness: 1
          transition: 5
        action: light.turn_on
      - delay: '00:00:05.2'
      - target:
          entity_id: light.bulb_e27_ws_globe_1055lm_chodba
        action: light.turn_off
      - delay: '00:00:00.7'
      - target:
          entity_id: light.bulb_e27_ws_globe_1055lm_chodba
        action: light.turn_off
    - conditions:
      - condition: or
        conditions:
        - condition: time
          after: '22:00:00'
        - condition: time
          before: 07:00:00
      sequence:
      - target:
          entity_id: light.bulb_e27_ws_globe_1055lm_chodba
        data:
          brightness: 89
          transition: 3
        action: light.turn_on
      - delay: '00:00:00.6'
      - target:
          entity_id: light.bulb_e27_ws_globe_1055lm_chodba
        data:
          color_temp_kelvin: 2000
          brightness: 89
        action: light.turn_on
      - wait_for_trigger:
        - entity_id: binary_sensor.motion_sensor_chodba
          to: 'off'
          for: 00:00:10
          trigger: state
        timeout: 00:10:00
        continue_on_timeout: true
      - target:
          entity_id: light.bulb_e27_ws_globe_1055lm_chodba
        data:
          brightness: 1
          transition: 5
        action: light.turn_on
      - delay: '00:00:05.2'
      - target:
          entity_id: light.bulb_e27_ws_globe_1055lm_chodba
        action: light.turn_off
      - delay: '00:00:00.7'
      - target:
          entity_id: light.bulb_e27_ws_globe_1055lm_chodba
        action: light.turn_off
  mode: restart
  variables:
    DAY_LEVEL: 254
    NIGHT_LEVEL: 89
