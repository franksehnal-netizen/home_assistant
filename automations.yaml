- id: '1762973628996'
  alias: Notify when Prusa MK4 finishes printing (AI summary + snapshot + quiet nights)
  description: AI shrnutí tisku (~200 slov), notifikace s tlačítkem pro vypnutí zásuvky,
    vizuální cue a návrat původního stavu světel.
  triggers:
  - entity_id: sensor.prusa_mk4
    from: printing
    to: finished
    for: 00:00:05
    trigger: state
  conditions:
  - condition: template
    value_template: '{% set last = state_attr(''automation.notify_when_prusa_mk4_finishes_printing_ai_summary_snapshot_quiet_nights'',''last_triggered'')
      %} {{ last is none or (as_timestamp(now()) - as_timestamp(last)) > 300 }}

      '
    enabled: false
  actions:
  - data:
      scene_id: before_printer_notification
    target:
      entity_id:
      - light.bulb_e27_cws_globe_806lm_hruska
      - light.home_assistant_voice_0a36ed_led_ring
      - light.led_strip_studio
    action: scene.create
  - delay: 00:00:01
  - response_variable: ai_msg
    data:
      instructions: 'You are Home Assistant. Write a friendly, ~200-word notification
        for the user that the Prusa MK4 print has just finished. Summarize the job
        using the known context: - File name: "{{ file_name }}" - Material: "{{ material
        }}" Include: - one-sentence recap of the model or purpose inferred from the
        file name if possible, - any handling/cooling advice for the given material
        (generic, non-technical, safe), - quick next steps (e.g., wait X minutes before
        removing, check bed/first layer, store filament dry), - a positive, motivating
        closing line. Keep it concise, readable on mobile (short paragraphs, no excessive
        lists), Czech language, and avoid hallucinating exact print parameters.

        '
    action: ai_task.generate_data
  - data:
      title: 3D tisk dokončen
      message: "{{ ai_msg.response\n   if ai_msg is defined and ai_msg.response |
        default('') | length > 0\n   else \"✅ 3D tisk byl úspěšně dokončen. Náhled
        a doporučení se nepodařilo vygenerovat, ale tisk je hotový. Můžete nyní bezpečně
        vyjmout výtisk. \U0001F44D\" }}\n"
      data:
        tag: prusa-finished
        actions:
        - action: TURN_OFF_PRUSA_PLUG
          title: Vypnout zásuvku Prusa
          destructive: true
    action: '{{ notif_target }}'
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ is_day }}'
      sequence:
      - target:
          entity_id:
          - light.bulb_e27_cws_globe_806lm_hruska
          - light.home_assistant_voice_0a36ed_led_ring
          - light.led_strip_studio
        data:
          rgb_color: '{{ green }}'
          brightness_pct: 100
          flash: long
          transition: 2
        action: light.turn_on
      - target:
          entity_id: '{{ media_player_entity }}'
        data:
          media:
            media_content_id: '{{ media_id }}'
            media_content_type: '{{ media_type }}'
            metadata: {}
        action: media_player.play_media
      - data:
          message: The print is done!
          preannounce: true
        action: assist_satellite.announce
    - conditions:
      - condition: template
        value_template: '{{ not is_day }}'
      sequence:
      - target:
          entity_id:
          - light.bulb_e27_cws_globe_806lm_hruska
          - light.led_strip_studio
        data:
          rgb_color: '{{ green }}'
          brightness_pct: 60
          flash: short
          transition: 2
        action: light.turn_on
  - delay: 00:00:10
  - target:
      entity_id: '{{ restore_scene }}'
    data:
      transition: 2
    action: scene.turn_on
  mode: single
  variables:
    is_day: '{{ now().hour >= 7 and now().hour < 22 }}'
    restore_scene: scene.before_printer_notification
    green:
    - 0
    - 255
    - 0
    notif_target: notify.mobile_app_samsung_galaxy_a54
    media_player_entity: media_player.living_room_speaker
    media_id: media-source://media_source/local/music/Intro GEN4_final [04-May-25].wav
    media_type: audio/x-wav
    file_name: '{{ states(''sensor.prusa_mk4_nazev_souboru'') }}'
    material: '{{ states(''sensor.prusa_mk4_material'') }}'
