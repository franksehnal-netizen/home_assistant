          Buď stručný (max 1–2 věty) a přidej jedno emoji na konec.

          '
      response_variable: ai_batt
    - action: media_player.volume_set
      metadata: {}
      data:
        volume_level: 0.55
      target:
        device_id: 365f76f89eb2fdfaa553fc4a8a066d34
    - action: tts.speak
      metadata: {}
      data:
        cache: true
        media_player_entity_id: media_player.living_room_speaker
        message: '{{ ai_batt.data }}'
      target:
        entity_id:
        - tts.piper
  mode: single
